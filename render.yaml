services:
  - type: worker
    name: straddle-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.9"

      # ── Telegram ──────────────────────────────────────────────────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false

      # ── Scheduling ────────────────────────────────────────────────────────
      - key: TZ
        value: Asia/Kolkata
      - key: SCAN_INTERVAL_MINUTES
        value: "5"
      - key: MONITOR_INTERVAL_MINUTES
        value: "1"
      - key: HOLD_UPDATE_MINUTES
        value: "10"
      - key: CONTRACT_TENORS
        value: "daily,weekly"
      - key: HARD_EXIT_HOUR
        value: "16"
      - key: HARD_EXIT_MINUTE
        value: "30"

      # ── Delta Exchange API (set in Render dashboard — never commit secrets) ─
      - key: DELTA_API_KEY
        sync: false
      - key: DELTA_API_SECRET
        sync: false

      # ── Trading mode ──────────────────────────────────────────────────────
      - key: PAPER_TRADE
        value: "true"              # change to "false" when going live

      # ── Position sizing ───────────────────────────────────────────────────
      - key: POSITION_CONTRACTS
        value: "100"
      - key: HALF_SIZE_CONTRACTS
        value: "50"

      # ── Cost model ────────────────────────────────────────────────────────
      - key: FEE_PCT_PER_FILL
        value: "0.0005"
      - key: SLIPPAGE_PCT
        value: "0.001"
